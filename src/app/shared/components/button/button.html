<button 
    [type]="type()"
    class="btn"
    [ngClass]="[
    'btn-' + color(), 'btn-' + size(), 'btn-' + variant()
    ]"
    [style.width]="width() + '%'"
    (click)="confirmClick()"
    [disabled]="disabled()"
    >
    @if (icon()) {
        <span class="material-icons">{{ icon() }}</span>
    }
    @if (label()) {
        {{ label() }}
    }
</button>
